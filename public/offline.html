<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — nid.local</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #141414; color: #f2f0ea; }
      .card { background: #1a1a1a; border-color: #2e2e2e; }
    }
    .card {
      text-align: center;
      max-width: 400px;
      background: #ffffff;
      border: 0.5px solid #e8e7e2;
      border-radius: 12px;
      padding: 40px 32px;
    }
    .logo { font-size: 24px; font-weight: 900; margin-bottom: 16px; }
    .logo .dot { color: #D4742A; }
    h1 { font-size: 18px; margin-bottom: 8px; }
    p { font-size: 14px; color: #6e6c67; margin-bottom: 24px; line-height: 1.5; }
    button {
      background: #D4742A; color: white; border: none;
      padding: 10px 24px; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-weight: 500;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">nid<span class="dot">.local</span></div>
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion Internet et réessayez.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
